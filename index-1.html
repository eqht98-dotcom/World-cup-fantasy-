  "canada":"CAN","qatar":"QAT","switzerland":"SUI","bosnia":"BIH","brazil":"BRA","morocco":"MAR","scotland":"SCO","haiti":"HAI",

};
function matchTeamId(apiName) {
  const n = norm(apiName);
  if (ALIAS[n]) return ALIAS[n];
  for (const [k, v] of Object.entries(ALIAS)) if (n.includes(k) || k.includes(n)) return v;
  return null;
}

const STARS = {};
RAW.forEach(([team, pos, en, ar, price, rating]) => { (STARS[team] = STARS[team] || []).push({ tokens: norm(en).split(" "), ar, price, rating }); });
function starFor(teamId, apiName) {
  const at = norm(apiName).split(" ");
  for (const s of (STARS[teamId] || [])) {
    const big = s.tokens.filter((x) => x.length >= 4);
    if (!big.some((x) => at.includes(x))) continue;
    const init = s.tokens.find((x) => x.length === 1);
    if (init && !at.some((x) => x.startsWith(init))) continue;
    return s;
  }
  return null;
}

function posOf(apiPos) {
  const p = (apiPos || "").toLowerCase();
  if (p.includes("keep")) return "GK";
  if (p.includes("def") || p.includes("back")) return "DEF";
  if (p.includes("mid")) return "MID";
  if (p.includes("off") || p.includes("forw") || p.includes("attack") || p.includes("wing") || p.includes("striker")) return "FWD";
  return "MID";
}

function buildFromApi(data) {
  const players = [], crests = {};
  let id = 0;
  for (const tm of data.teams || []) {
    const tid = matchTeamId(tm.name) || matchTeamId(tm.shortName);
    if (!tid) continue;
    crests[tid] = tm.crest;
    const str = TEAM[tid].str;
    for (const pl of tm.squad || []) {
      const pos = posOf(pl.position);
      const star = starFor(tid, pl.name);
      const price = star ? star.price : Math.min(8.5, Math.max(3.5, Math.round((3.3 + (str - 69) * 0.085 + { GK: -0.2, DEF: 0, MID: 0.4, FWD: 0.7 }[pos] + Math.random() * 1.2) * 2) / 2));
      const rating = star ? star.rating : Math.max(64, Math.min(90, Math.round(str + Math.random() * 10 - 6)));
      players.push({ id: id++, team: tid, pos, en: pl.name, ar: star ? star.ar : pl.name, price, rating });
    }
  }
  // أي منتخب ما رجع من الـ API يكمل من بيانات النجوم الاحتياطية
  for (const tm of TEAMS) {
    if (!players.some((p) => p.team === tm.id)) {
      RAW.filter((r) => r[0] === tm.id).forEach((r) => players.push({ id: id++, team: r[0], pos: r[1], en: r[2], ar: r[3], price: r[4], rating: r[5] }));
    }
  }
  return { players, crests };
}

/* ---------- simulation helpers ---------- */
const poisson = (lam) => { const L = Math.exp(-lam); let k = 0, p = 1; do { k++; p *= Math.random(); } while (p > L); return k - 1; };
const wPick = (arr, wf) => { const ws = arr.map(wf); const s = ws.reduce((a, b) => a + b, 0); let r = Math.random() * s; for (let i = 0; i < arr.length; i++) { r -= ws[i]; if (r <= 0) return arr[i]; } return arr[arr.length - 1]; };
const goalW = (p) => ({ FWD: 5, MID: 3, DEF: 0.8, GK: 0.05 }[p.pos] * p.rating);
const assistW = (p) => ({ FWD: 3, MID: 4, DEF: 1, GK: 0.1 }[p.pos] * p.rating);
const goalPts = (pos) => ({ GK: 6, DEF: 6, MID: 5, FWD: 4 }[pos]);

function simMatch(players, aId, bId, knockout) {
  const a = TEAM[aId], b = TEAM[bId];
  const d = (a.str - b.str) / 22;
  let ga = poisson(Math.max(0.25, 1.25 + d)), gb = poisson(Math.max(0.25, 1.25 - d));
  let pens = false, winner = null;
  if (knockout && ga === gb) {
    if (Math.random() < 0.45) { Math.random() < a.str / (a.str + b.str) ? ga++ : gb++; }
    else { pens = true; winner = Math.random() < a.str / (a.str + b.str) ? aId : bId; }
  }
  if (knockout && !pens) winner = ga > gb ? aId : bId;
  const pts = {};
  const sides = [[aId, ga, gb], [bId, gb, ga]];
  for (const [tid, gf, gaAgainst] of sides) {
    const full = players.filter((p) => p.team === tid).sort((x, y) => y.rating - x.rating);
    // التشكيلة: أفضل 13 تقييماً يلعبون دائماً + احتمال 25% للبقية
    const squad = full.filter((p, i) => i < 13 || Math.random() < 0.25);
    squad.forEach((p) => { pts[p.id] = 2; });
    for (let g = 0; g < gf; g++) {
      const scorer = wPick(squad, goalW);
      pts[scorer.id] += goalPts(scorer.pos);
      if (Math.random() < 0.7) {
        const others = squad.filter((p) => p.id !== scorer.id);
        pts[wPick(others, assistW).id] += 3;
      }
    }
    if (gaAgainst === 0) squad.forEach((p) => { if (p.pos === "GK" || p.pos === "DEF") pts[p.id] += 4; else if (p.pos === "MID") pts[p.id] += 1; });
    squad.forEach((p) => { if (Math.random() < 0.09) pts[p.id] -= 1; });
  }
  return { a: aId, b: bId, ga, gb, pens, winner, pts };
}

const groupTeams = (g) => TEAMS.filter((t) => t.group === g).map((t) => t.id);
function groupFixtures(mdIdx) {
  const fx = [];
  for (const g of GROUPS) {
    const [t0, t1, t2, t3] = groupTeams(g);
    if (mdIdx === 0) fx.push([t0, t1], [t2, t3]);
    if (mdIdx === 1) fx.push([t0, t2], [t1, t3]);
    if (mdIdx === 2) fx.push([t0, t3], [t1, t2]);
  }
  return fx;
}
function computeStandings(groupResults) {
  const st = {};
  TEAMS.forEach((t) => { st[t.id] = { pts: 0, gd: 0, gf: 0 }; });
  groupResults.forEach((m) => {
    st[m.a].gf += m.ga; st[m.b].gf += m.gb;
    st[m.a].gd += m.ga - m.gb; st[m.b].gd += m.gb - m.ga;
    if (m.ga > m.gb) st[m.a].pts += 3; else if (m.gb > m.ga) st[m.b].pts += 3; else { st[m.a].pts++; st[m.b].pts++; }
  });
  return st;
}
const rankCmp = (st) => (x, y) => st[y].pts - st[x].pts || st[y].gd - st[x].gd || st[y].gf - st[x].gf;
function bracketSeedOrder(n) { let r = [1]; while (r.length < n) { const m = r.length * 2; r = r.flatMap((s) => [s, m + 1 - s]); } return r; }

        <div className={`chipBody ${captain === id ? "cap" : ""}`} style={{ background: captain === id ? GOLD : PANEL2, color: captain === id ? "#1A1408" : TEXT, borderRadius: 8, padding: "3px 4px", fontSize: 10.5, fontWeight: 800, border: `1.5px solid ${captain === id ? GOLD : tc + "88"}`, lineHeight: 1.25 }}>
          {name(p)}{captain === id ? " ©" : ""}
          <div style={{ fontWeight: 600, color: captain === id ? "#3A2D10" : MUTED, fontSize: 9.5 }}>
            {p.price.toFixed(1)} {lp != null ? `• ${id === captain ? lp * (lastRound.tc ? 3 : 2) : lp}${t("ن", "p")}` : ""}
            {dead ? ` • ${t("أُقصي", "OUT")}` : ""}
          </div>
        </div>
        {phase !== "done" && (
          <button onClick={(e) => { e.stopPropagation(); remove(id); }} style={{ position: "absolute", top: -2, insetInlineEnd: 2, background: RED, color: "#fff", border: "none", borderRadius: "50%", width: 16, height: 16, fontSize: 10, lineHeight: "14px", cursor: "pointer", padding: 0 }}>×</button>

  const Row = ({ pos }) => (
    <div style={{ display: "flex", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
      {squad.filter((id) => P[id].pos === pos).map((id) => <PlayerChip key={id} id={id} />)}

        <div key={i} onClick={() => { setTab("market"); setPosFilter(pos); }} style={{ width: 78, height: 58, border: "1.5px dashed rgba(255,255,255,.65)", borderRadius: 8, display: "grid", placeItems: "center", color: "rgba(255,255,255,.95)", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+ {t({ GK: "حارس", DEF: "مدافع", MID: "وسط", FWD: "مهاجم" }[pos], pos)}</div>

  const MatchCard = ({ m }) => (
    <div style={{ ...S.card, padding: "10px 12px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>

  );

  /* ================= render ================= */
  if (!PLAYERS) return (
    <div style={{ direction: ar ? "rtl" : "ltr", minHeight: "100vh", display: "grid", placeItems: "center", background: NAVY, color: TEXT, fontFamily: "'IBM Plex Sans Arabic', sans-serif" }}>

        <div style={{ fontSize: 44 }}>🏆</div>
        <div style={{ fontWeight: 800, fontSize: 16, marginTop: 8 }}>{t("جاري سحب القوائم الرسمية للـ 48 منتخب…", "Loading official squads for all 48 teams…")}</div>
        <div style={{ color: MUTED, fontSize: 12, marginTop: 6 }}>football-data.org</div>
      </div>
    </div>
  );
  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        button { transition: transform .12s ease, filter .15s ease, box-shadow .2s ease, border-color .2s ease, color .2s ease; }
        button:hover:not(:disabled) { filter: brightness(1.06); box-shadow: 0 4px 18px rgba(255,46,99,.25); }
        button:active:not(:disabled) { transform: scale(.95); }
        button:focus-visible { outline: 2px solid ${GOLD}; outline-offset: 2px; }
        .chipCard { transition: transform .15s ease, box-shadow .2s ease; }
        .chipCard:hover { transform: translateY(-3px); }
        .chipCard:hover .chipBody { box-shadow: 0 4px 14px color-mix(in srgb, var(--tc, ${GOLD}) 45%, transparent); }
        .chipBody { transition: box-shadow .2s ease, background .2s ease; }
        .cap { animation: capGlow 1.8s ease-in-out infinite; }
        @keyframes capGlow { 0%,100% { box-shadow: 0 0 5px ${GOLD}88; } 50% { box-shadow: 0 0 16px ${GOLD}; } }
        .mrow { transition: border-color .2s ease, background .2s ease, transform .15s ease; border-inline-start: 3px solid var(--tc) !important; }
        .mrow:hover { border-color: var(--tc); background: ${PANEL2}; transform: scale(1.01); }
        .node { transition: background .35s ease, box-shadow .35s ease, border-color .35s ease; }
        .blob { position: absolute; width: 62vw; height: 62vw; min-width: 400px; min-height: 400px; border-radius: 50%; filter: blur(95px); opacity: .30; }
        .b1 { background: ${C26R}; top: -18%; insetInlineStart: -12%; animation: drift1 13s ease-in-out infinite alternate; }
        .b2 { background: ${C26G}; bottom: -22%; insetInlineEnd: -16%; animation: drift2 17s ease-in-out infinite alternate; }
        .b3 { background: ${C26B}; top: 28%; insetInlineStart: 45%; animation: drift3 21s ease-in-out infinite alternate; }
        @keyframes drift1 { to { transform: translate(11vw, 9vh) scale(1.18); } }
        @keyframes drift2 { to { transform: translate(-9vw, -7vh) scale(1.12); } }
        @keyframes drift3 { to { transform: translate(-13vw, 11vh) scale(1.22); } }
        .emblem { position: fixed; top: 50%; left: 50%; width: min(85vw, 540px); opacity: .14; animation: floaty 9s ease-in-out infinite; }
        @keyframes floaty { 0%,100% { transform: translate(-50%,-52%) rotate(-2deg); } 50% { transform: translate(-50%,-47%) rotate(2deg); } }
        .gradText { background: linear-gradient(90deg, ${C26R}, ${GOLD}, ${C26G}, ${C26B}, ${C26R}); background-size: 300% 100%; -webkit-background-clip: text; background-clip: text; color: transparent; animation: hueSlide 6s linear infinite; }
        @keyframes hueSlide { to { background-position: 300% 0; } }
        ::-webkit-scrollbar { height: 4px; width: 4px; } ::-webkit-scrollbar-thumb { background:${LINE}; border-radius: 4px; }
        @keyframes rise { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform:none;} }
        .rise { animation: rise .35s ease both; }
        @keyframes pop { 0% { transform: scale(.6); opacity:0; } 60% { transform: scale(1.12); } 100% { transform: scale(1); opacity:1; } }
        .pop { animation: pop .4s ease both; }
        @media (prefers-reduced-motion: reduce) { .rise, .pop, .cap, .blob, .emblem, .gradText { animation: none; } .chipCard, button, .mrow, .node { transition: none; } }
      `}</style>

      {/* energetic background: pastel color washes + original "26 + trophy" emblem */}

          <defs>
            <linearGradient id="wcFire" x1="0" y1="0" x2="1" y2="1">

            </linearGradient>
            <linearGradient id="wcCool" x1="0" y1="0" x2="0" y2="1">

        </div>

          <button key={k} onClick={() => setTab(k)} style={S.tabBtn(tab === k, c)}>{lbl}</button>

              {eliminatedInSquad.length > 0 && <Pill color={RED} bg="rgba(242,61,82,.12)">⚠ {eliminatedInSquad.length} {t("لاعب من منتخب مُقصى", "from eliminated teams")}</Pill>}
            </div>

            <div style={{ background: `linear-gradient(180deg, ${PITCH}, #0E7A43)`, border: `1.5px solid #0E8A4C`, borderRadius: 16, padding: "18px 8px", display: "grid", gap: 18, position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", inset: 0, opacity: 0.18, background: "repeating-linear-gradient(180deg, transparent 0 44px, rgba(255,255,255,.25) 44px 45px)" }} />
              <div style={{ position: "relative", display: "grid", gap: 16 }}>
                <Row pos="FWD" /><Row pos="MID" /><Row pos="DEF" /><Row pos="GK" />
              </div>
            </div>
            <div style={{ fontSize: 11, color: MUTED, textAlign: "center" }}>{t("اضغط على اللاعب لتعيينه كابتن (نقاط ×2) — حد أقصى لاعبَين من كل منتخب", "Tap a player to set captain (×2) — max 2 players per nation")}</div>

            {phase !== "done" && (
              <div style={{ display: "flex", gap: 8 }}>

              </div>

            {phase === "build" && (
              <div style={{ display: "flex", gap: 8 }}>

              </div>
            )}
          </div>
        )}

        {/* ===== MARKET ===== */}
        {tab === "market" && (
          <div className="rise" style={{ display: "grid", gap: 10 }}>
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder={t("ابحث عن لاعب…", "Search player…")} style={{ background: PANEL, color: TEXT, border: `1.5px solid ${LINE}`, borderRadius: 10, padding: "10px 14px", fontSize: 13, fontFamily: "inherit", outline: "none" }} />

              ))}
              <select value={teamFilter} onChange={(e) => setTeamFilter(e.target.value)} style={{ background: PANEL, color: TEXT, border: `1.5px solid ${LINE}`, borderRadius: 10, padding: "7px 10px", fontSize: 12, fontFamily: "inherit" }}>
                <option value="ALL">{t("كل المنتخبات (48)", "All 48 teams")}</option>
                {GROUPS.map((g) => (
                  <optgroup key={g} label={`${t("المجموعة", "Group")} ${g}`}>

              {PLAYERS.filter((p) => (posFilter === "ALL" || p.pos === posFilter) && (teamFilter === "ALL" || p.team === teamFilter) && (!q.trim() || p.en.toLowerCase().includes(q.trim().toLowerCase()) || p.ar.includes(q.trim()) || TEAM[p.team].ar.includes(q.trim()) || TEAM[p.team].en.toLowerCase().includes(q.trim().toLowerCase())))
                .sort((a, b) => b.price - a.price)
                .slice(0, 60)
                .map((p) => {
                  const inS = squad.includes(p.id), dead = !alive.has(p.team);
                  return (
                    <div key={p.id} className="mrow" style={{ ...S.card, "--tc": TEAM[p.team].c, padding: "9px 12px", display: "flex", alignItems: "center", gap: 10, opacity: dead ? 0.45 : 1 }}>
                      <div style={{ width: 24, textAlign: "center" }}><Crest tid={p.team} s={22} /></div>

                    </div>

                {GROUPS.map((g) => (
                  <div key={g} style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, marginBottom: 4 }}>{t("المجموعة", "Group")} {g}</div>
                    {groupTeams(g).sort(rankCmp(standings)).map((tid, i) => (
                      <div key={tid} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, padding: "4px 6px", color: !alive.has(tid) && roundIdx > 2 ? MUTED : TEXT }}>
                        <span>{i + 1}. <Crest tid={tid} s={16} /> {tname(tid)}</span>
                        <span style={{ color: MUTED }}>{standings[tid].pts} {t("ن", "pts")} • {standings[tid].gd > 0 ? "+" : ""}{standings[tid].gd}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
      </div>

      {/* toast */}
      {toast && (
        <div className="pop" style={{ position: "fixed", bottom: 20, left: 0, right: 0, margin: "0 auto", width: "fit-content", background: PANEL, border: `1px solid ${GOLD}`, color: TEXT, padding: "10px 18px", borderRadius: 12, fontSize: 13, fontWeight: 700, zIndex: 50, boxShadow: "0 8px 24px rgba(24,32,74,.18)" }}>{toast}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
