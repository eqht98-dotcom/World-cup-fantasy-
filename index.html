function starFor(teamId, apiName) {
  const at = norm(apiName).split(" ");
  for (const s of (STARS[teamId] || [])) {
    const big = s.tokens.filter((x) => x.length >= 4);
    if (!big.some((x) => at.includes(x))) continue;

    if (init && !at.some((x) => x.startsWith(init))) continue;

}

const poisson = (lam) => { const L = Math.exp(-lam); let k = 0, p = 1; do { k++; p *= Math.random(); } while (p > L); return k - 1; };
const wPick = (arr, wf) => { const ws = arr.map(wf); const s = ws.reduce((a, b) => a + b, 0); let r = Math.random() * s; for (let i = 0; i < arr.length; i++) { r -= ws[i]; if (r <= 0) return arr[i]; } return arr[arr.length - 1]; };
const goalW = (p) => ({ FWD: 5, MID: 3, DEF: 0.8, GK: 0.05 }[p.pos] * p.rating);
const assistW = (p) => ({ FWD: 3, MID: 4, DEF: 1, GK: 0.1 }[p.pos] * p.rating);
const goalPts = (pos) => ({ GK: 10, DEF: 6, MID: 5, FWD: 4 }[pos] ?? 4);

function simMatch(players, aId, bId, knockout) {
  const a = TEAM[aId], b = TEAM[bId];
  const d = (a.str - b.str) / 22;
  let ga = poisson(Math.max(0.25, 1.25 + d)), gb = poisson(Math.max(0.25, 1.25 - d));
  let pens = false, winner = null;
  if (knockout && ga === gb) {
    if (Math.random() < 0.45) { Math.random() < a.str / (a.str + b.str) ? ga++ : gb++; }
    else { pens = true; winner = Math.random() < a.str / (a.str + b.str) ? aId : bId; }
  }
  if (knockout && !pens) winner = ga > gb ? aId : bId;
  const pts = {};
  const sides = [[aId, ga, gb], [bId, gb, ga]];
  for (const [tid, gf, gaAgainst] of sides) {
    const full = players.filter((p) => p.team === tid).sort((x, y) => y.rating - x.rating);
    // التشكيلة: أفضل 13 تقييماً يلعبون دائماً + احتمال 25% للبقية
    const squad = full.filter((p, i) => i < 13 || Math.random() < 0.25);
    squad.forEach((p) => { pts[p.id] = 2; });
    for (let g = 0; g < gf; g++) {
      const scorer = wPick(squad, goalW);
      pts[scorer.id] += goalPts(scorer.pos);
      if (Math.random() < 0.7) {
        const others = squad.filter((p) => p.id !== scorer.id);
        pts[wPick(others, assistW).id] += 3;
      }
    }
    if (gaAgainst === 0) squad.forEach((p) => { if (p.pos === "GK" || p.pos === "DEF") pts[p.id] += 4; else if (p.pos === "MID") pts[p.id] += 1; });
    squad.forEach((p) => { if (Math.random() < 0.09) pts[p.id] -= 1; });
  }
  return { a: aId, b: bId, ga, gb, pens, winner, pts };
}

}
function computeStandings(groupResults) {
  const st = {};
  TEAMS.forEach((t) => { st[t.id] = { pts: 0, gd: 0, gf: 0 }; });
  groupResults.forEach((m) => {
    st[m.a].gf += m.ga; st[m.b].gf += m.gb;

  });

}

      if (cost + p.price + (15 - pick.length - 1) * 4.0 > BUDGET) continue;
      take(p);
      if (pick.length === 11) break;
    }
    // الدكة: الأرخص لإكمال تركيبة الـ15
    const byPrice = [...PLAYERS].sort((a, b) => a.price - b.price || b.rating - a.rating);
    for (const p of byPrice) {
      if (pick.length === 15) break;
      if (pick.includes(p.id)) continue;
      if ((cnt[p.pos] || 0) >= SQUAD_COMP[p.pos]) continue;
      if ((perTeam[p.team] || 0) >= MAX_PER_TEAM) continue;
      if (cost + p.price > BUDGET) continue;
      take(p);
    }
    setSquad(pick);
    const xi = pickXI(pick, f, Object.fromEntries(PLAYERS.map((p) => [p.id, p])));
    setStarters(xi);
    setCaptain(xi.map((id) => P[id] || PLAYERS.find((p) => p.id === id)).sort((a, b) => b.rating - a.rating)[0].id);
  };

  const f = FORMATIONS[formation];
  const sCounts = starters.reduce((c, id) => ((c[P[id]?.pos] = (c[P[id]?.pos] || 0) + 1), c), {});
  const bench = squad.filter((id) => !starters.includes(id));
  const valid = squad.length === 15
    && Object.entries(SQUAD_COMP).every(([k, v]) => (counts[k] || 0) === v)
    && starters.length === 11
    && Object.entries(f).every(([k, v]) => (sCounts[k] || 0) === v)
    && captain != null && starters.includes(captain);
  const applyFormation = (fname) => {
    setFormation(fname);
    const xi = pickXI(squad, FORMATIONS[fname], P);
    setStarters(xi);
    if (captain && !xi.includes(captain)) setCaptain(null);
  };
  const benchTap = (id) => {
    if (phase === "done") return;
    const p = P[id];
    const cands = starters.filter((x) => P[x].pos === p.pos);
    if (!cands.length) { ping(t("ما في مركز مطابق في الأساسية — غيّر الخطة", "No matching position in XI — change formation")); return; }
    const out = cands.sort((a, b) => P[a].rating - P[b].rating)[0];
    setStarters((st) => st.map((x) => (x === out ? id : x)));
    if (captain === out) setCaptain(id);
    ping(t("تم التبديل ↔ (مجاني، لا يُحسب انتقالاً)", "Swapped ↔ (free, not a transfer)"));
  };

  /* ---------- play a round ---------- */
  const playRound = () => {
    if (!valid) { ping(t("أكمل تشكيلتك أولاً", "Complete your squad first")); return; }
    let matches = [];
    let newAlive = new Set(alive);

    if (roundIdx <= 2) {
      matches = groupFixtures(roundIdx).map(([a, b]) => simMatch(PLAYERS, a, b, false));
      const allGroup = [...groupResults, ...matches];
      setGroupResults(allGroup);
      if (roundIdx === 2) {
        const st = computeStandings(allGroup);
        const winners = [], runners = [], thirds = [];
        for (const g of GROUPS) {
          const ranked = groupTeams(g).sort(rankCmp(st));
          winners.push(ranked[0]); runners.push(ranked[1]); thirds.push(ranked[2]);
        }
        winners.sort(rankCmp(st)); runners.sort(rankCmp(st)); thirds.sort(rankCmp(st));
        const seeds = [...winners, ...runners, ...thirds.slice(0, 8)]; // 32 qualifiers
        const order = bracketSeedOrder(32);
        const pairs = [];
        for (let i = 0; i < 32; i += 2) pairs.push([seeds[order[i] - 1], seeds[order[i + 1] - 1]]);
        setKoPairs(pairs);
        newAlive = new Set(seeds);
      }
    } else {
      matches = koPairs.map(([a, b]) => simMatch(PLAYERS, a, b, true));
      const winners = matches.map((m) => m.winner);
      newAlive = new Set(winners);
      if (winners.length === 1) setChampion(winners[0]);
      else {
        const np = [];
        for (let i = 0; i < winners.length; i += 2) np.push([winners[i], winners[i + 1]]);
        setKoPairs(np);
      }
    }

    const allPts = Object.assign({}, ...matches.map((m) => m.pts));
    let userPts = 0;
    const usedSubs = new Set();
    for (const id of starters) {
      let scorerId = id;
      if (allPts[id] == null) {
        // بديل آلي من الدكة بنفس المركز (لاعب لم يشارك أو منتخبه مُقصى)
        const sub = bench.find((b) => !usedSubs.has(b) && P[b].pos === P[id].pos && allPts[b] != null);
        if (sub) { usedSubs.add(sub); scorerId = sub; }
      }
      let pp = allPts[scorerId] ?? 0;
      if (pbArmed && allPts[scorerId] != null && (P[scorerId].pos === "GK" || P[scorerId].pos === "DEF")) pp += 3;
      if (id === captain) pp *= tcArmed ? 3 : 2;
      userPts += pp;
    }
    setHistory((h) => [...h, { roundId: round.id, matches, userPts, cost: 0, pts: allPts, tc: tcArmed }]);
    setBotPts((b) => b.map((v) => v + Math.round(BOT_GAIN[roundIdx] * (0.65 + Math.random() * 0.7))));
    if (tcArmed) setChips((c) => ({ ...c, tc: round.id }));
    if (wcActive) setChips((c) => ({ ...c, wc: round.id }));
    if (pbArmed) setChips((c) => ({ ...c, pb: round.id }));
    setTcArmed(false); setWcActive(false); setPbArmed(false); setTransfers(0);
    setAlive(newAlive);
    if (roundIdx === 7) { setPhase("done"); setTab("matches"); }
    else { setRoundIdx(roundIdx + 1); setPhase("play"); setTab("matches"); }
    ping(t(`نقاط الجولة: ${userPts}`, `Round points: ${userPts}`));
    if (user && sb) syncSquad(userTotal + userPts);
  };

  const eliminatedInSquad = starters.filter((id) => !alive.has(P[id]?.team));
  const lastRound = history[history.length - 1];
  const standings = useMemo(() => computeStandings(groupResults), [groupResults]);

  /* ---------- الوضع الواقعي: نتائج حقيقية + Deadlines ---------- */
  const mode = "real";
  const [rm, setRm] = useState(null);
  const [lastSync, setLastSync] = useState(null);
  const [tick, setTick] = useState(0); // يتحدث كل ثانية لإعادة حساب النقاط محلياً

  const refreshReal = () => {
    fetch(`${WORKER}/v4/competitions/WC/matches?v=1`, { cache: "no-store" })
      .then((r) => r.json())
      .then((d) => { setRm(d.matches || []); setLastSync(new Date()); })
      .catch(() => {});
  };

  // طلب من الـ API: كل 15ث أثناء مباريات حية، كل 60ث بدونها
  useEffect(() => {
    refreshReal();
    const iv = setInterval(() => {
      const hasLive = rm && rm.some(m => ["IN_PLAY","PAUSED"].includes(m.status));
      refreshReal();
    }, 15000);
    return () => clearInterval(iv);
  }, []);

  // عداد كل ثانية لإعادة حساب النقاط محلياً بدون API
  useEffect(() => {
    const iv = setInterval(() => setTick(t => t + 1), 1000);
    return () => clearInterval(iv);
  }, []);
  const [rs, setRs] = useState(null);
  const [afByKey, setAfByKey] = useState({});
  const [afEvents, setAfEvents] = useState({});
  const mkKey = (a, b) => [a, b].filter(Boolean).sort().join("_");
  useEffect(() => { const f = () => fetch(`${WORKER}/v4/competitions/WC/standings?v=1`, { cache: "no-store" }).then((r) => r.json()).then((d) => setRs(d.standings || [])).catch(() => {}); f(); const iv = setInterval(f, 120000); return () => clearInterval(iv); }, []);
  useEffect(() => { fetch(`${EV_WORKER}/fixtures`, { cache: "no-store" }).then(r => r.json()).then(d => { if (d.byKey) setAfByKey(d.byKey); }).catch(() => {}); }, []);
  useEffect(() => {
    if (!rm || !Object.keys(afByKey).length) return;
    const go = async () => {
      for (const m of rm) {
        if (!["FINISHED","IN_PLAY","PAUSED"].includes(m.status)) continue;
        const a = tidOf(m.homeTeam), b = tidOf(m.awayTeam);
        const fid = afByKey[mkKey(a, b)];
        if (!fid || afEvents[fid]) continue;
        try {
          const live = ["IN_PLAY","PAUSED"].includes(m.status) ? 1 : 0;
          const r = await fetch(`${EV_WORKER}/events?fid=${fid}&live=${live}`);
          const d = await r.json();
          if (d.events) setAfEvents(prev => ({ ...prev, [fid]: d.events }));
        } catch {}
        await new Promise(ok => setTimeout(ok, 300)); // فاصل بين الطلبات
      }
    };
    go();
    const iv = setInterval(go, 90000);
    return () => clearInterval(iv);
  }, [rm, afByKey]); // تحديث تلقائي بالخلفية كل دقيقة

  const byAid = useMemo(() => (PLAYERS ? Object.fromEntries(PLAYERS.filter((p) => p.aid != null).map((p) => [p.aid, p])) : {}), [PLAYERS]);
  const tidOf = (apiTeam) => (apiTeam ? (apiMap[apiTeam.id] || matchTeamId(apiTeam.name || "")) : null);

  // تجميع المباريات الحقيقية حسب الجولة + الـ deadline (قبل البداية بـ5 ساعات)
  const realRounds = useMemo(() => {
    const out = {};
    if (!rm) return out;
    for (const r of ROUNDS) out[r.id] = { ms: [] };
    for (const m of rm) { const rid = roundOfMatch(m); if (rid && out[rid]) out[rid].ms.push(m); }
    for (const r of ROUNDS) {
      const info = out[r.id];
      info.ms.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
      if (info.ms.length) {
        info.start = new Date(info.ms[0].utcDate).getTime();
        info.deadline = info.start - 3 * 3600 * 1000;
        info.finished = info.ms.every((m) => m.status === "FINISHED");
        info.live = info.ms.some((m) => ["IN_PLAY", "PAUSED"].includes(m.status));
      }
      info.ko = r.ko;
    }
    return out;
  }, [rm, tick]); // tick → يُعاد الحساب كل ثانية

  // بداية شخصية: نقاط كل مستخدم تُحتسب من المباريات التالية لوقت إنشاء حسابه
  const userStart = user?.created_at ? new Date(user.created_at).getTime() : 0;
  // الـ deadline الشخصي: إن سجّل أثناء جولة جارية، يقفل عند انطلاقة أول مباراة قادمة له
  const pDeadline = (info) => {
    if (!info?.ms?.length) return null;
    if (userStart <= info.deadline) return info.deadline;
    const nm = info.ms.find((m) => new Date(m.utcDate).getTime() > userStart);
    return nm ? new Date(nm.utcDate).getTime() : info.deadline;
  };
  const nextRound = useMemo(() => {
    const now = Date.now();
    for (const r of ROUNDS) { const i = realRounds[r.id]; const d = pDeadline(i); if (i?.ms?.length && d != null && now < d) return { ...r, ...i, deadline: d }; }
    return null;
  }, [realRounds, userStart, tick]);

  // المنتخبات الحية واقعياً: المشاركون في آخر دور أُعلنت مبارياته
  const aliveReal = useMemo(() => {
    let set = new Set(TEAMS.map((x) => x.id));
    for (const rid of ["R32", "R16", "QF", "SF", "F"]) {
      const i = realRounds[rid];
      if (!i?.ms?.length) break;
      const teams = new Set();
      i.ms.forEach((m) => { const a = tidOf(m.homeTeam), b = tidOf(m.awayTeam); if (a) teams.add(a); if (b) teams.add(b); });
      if (teams.size >= 2) set = teams; else break; // placeholders لم تتحدد بعد
    }
    return set;
  }, [realRounds, apiMap]);

  // لقطات التشكيلة عند كل deadline (محفوظة محلياً بمعرّفات اللاعبين الرسمية)
  const SNAP_KEY = "wcf26_v3_" + (user?.id || "anon");
  const [snaps, setSnaps] = useState({});
  useEffect(() => { try { setSnaps(JSON.parse(localStorage.getItem(SNAP_KEY) || "{}")); } catch { setSnaps({}); } }, [SNAP_KEY]);
  useEffect(() => {
    if (mode !== "real" || !rm || !PLAYERS) return;
    const now = Date.now();
    const ns = { ...snaps }; let changed = false;
    for (const r of ROUNDS) {
      const info = realRounds[r.id];
      const pd = pDeadline(info);
      if (!info?.ms?.length || pd == null || now < pd || ns[r.id]) continue;
      let pend = null; try { pend = (JSON.parse(localStorage.getItem(SNAP_KEY + "_pend") || "{}"))[r.id] || null; } catch {}
      if (pend || starters.length === 11) {
        ns[r.id] = pend || { st: starters.map((id) => P[id]?.aid).filter(Boolean), bn: bench.map((id) => P[id]?.aid).filter(Boolean), cap: captain != null ? P[captain]?.aid : null, f: formation, ts: now };
        changed = true;
      }
    }
    if (changed) { setSnaps(ns); setTransfers(0); try { localStorage.setItem(SNAP_KEY, JSON.stringify(ns)); } catch {} }
  }, [rm, mode, PLAYERS, starters, bench, captain, formation, realRounds]);

  // حفظ التشكيلة المعلّقة لكل جولة قبل موعد قفلها — حتى لو أُغلق التطبيق قبل الانطلاقة
  useEffect(() => {
    if (mode !== "real" || !PLAYERS || starters.length !== 11) return;
    const now = Date.now();
    let pend = {}; try { pend = JSON.parse(localStorage.getItem(SNAP_KEY + "_pend") || "{}"); } catch {}
    let ch = false;
    for (const r of ROUNDS) {
      const info = realRounds[r.id]; const pd = pDeadline(info);
      if (!info?.ms?.length || pd == null || now >= pd || snaps[r.id]) continue;
      pend[r.id] = { st: starters.map((id) => P[id]?.aid).filter(Boolean), bn: bench.map((id) => P[id]?.aid).filter(Boolean), cap: captain != null ? P[captain]?.aid : null, f: formation, ts: now };
      ch = true;
    }
    if (ch) try { localStorage.setItem(SNAP_KEY + "_pend", JSON.stringify(pend)); } catch {}
  }, [starters, bench, captain, formation, PLAYERS, realRounds, snaps, SNAP_KEY]);

  // حساب نقاط جولة من النتائج الفعلية — نظام النقاط الرسمي الكامل
  function realRoundPoints(rid) {
    const snap = snaps[rid], info = realRounds[rid];
    if (!snap || !info?.ms?.length) return null;
    const teamPlayed = new Set();
    const conceded = {};   // عدد الأهداف المستقبَلة لكل منتخب
    const goals = {};      // أهداف لكل aid
    const assists = {};    // تمريرات حاسمة لكل aid
    const ownGoals = {};   // أهداف عكسية لكل aid
    const cards = {};      // بطاقات (-1 صفراء، -3 حمراء)
    const penMissed = {};  // ضربات جزاء ضائعة

    for (const m of info.ms) {
      if (!["FINISHED","IN_PLAY","PAUSED"].includes(m.status)) continue;
      if (userStart && new Date(m.utcDate).getTime() < userStart) continue;
      const a = tidOf(m.homeTeam), b = tidOf(m.awayTeam);
      const hg = m.score?.fullTime?.home ?? 0, ag = m.score?.fullTime?.away ?? 0;
      if (a) { teamPlayed.add(a); conceded[a] = (conceded[a] || 0) + ag; }
      if (b) { teamPlayed.add(b); conceded[b] = (conceded[b] || 0) + hg; }
      for (const g of m.goals || []) {
        if (g.type === "OWN") {
          if (g.scorer?.id) ownGoals[g.scorer.id] = (ownGoals[g.scorer.id] || 0) + 1;
        } else {
          if (g.scorer?.id) goals[g.scorer.id] = (goals[g.scorer.id] || 0) + 1;
          if (g.assist?.id) assists[g.assist.id] = (assists[g.assist.id] || 0) + 1;
        }
      }
      for (const bk of m.bookings || []) {
        if (bk.player?.id) {
          const isRed = bk.card === "RED" || bk.card === "RED_CARD";
          cards[bk.player.id] = (cards[bk.player.id] || 0) + (isRed ? 3 : 1);
        }
      }
      // ضربات الجزاء الضائعة (penaltyMissed في بعض نسخ API)
      for (const pen of m.penaltyMisses || m.missedPenalties || []) {
        if (pen.player?.id) penMissed[pen.player.id] = (penMissed[pen.player.id] || 0) + 1;
      }
    }

    const ptsOf = (aid) => {
      const p = byAid[aid];
      if (!p || !teamPlayed.has(p.team)) return null;
      const conc = conceded[p.team] || 0;
      // مشاركة: 2 ثابتة
      let pp = 2;
      // أهداف
      pp += (goals[aid] || 0) * goalPts(p.pos);
      // تمريرات حاسمة
      pp += (assists[aid] || 0) * 3;
      // أهداف عكسية
      pp -= (ownGoals[aid] || 0) * 2;
      // بطاقات
      pp -= (cards[aid] || 0);
      // ضربات جزاء ضائعة
      pp -= (penMissed[aid] || 0) * 2;
      // شباك نظيفة (نفترض اللاعب لعب كاملاً — أفضل تقريب بدون بيانات الدقائق)
      if (conc === 0) {
        pp += p.pos === "GK" || p.pos === "DEF" ? 4 : p.pos === "MID" ? 1 : 0;
      }
      // خصم الأهداف المستقبَلة: كل هدفين = -1 (حراس ومدافعون فقط)
      if (p.pos === "GK" || p.pos === "DEF") {
        pp -= Math.floor(conc / 2);
      }
      return pp;
    };

    let total = 0;
    const usedSubs = new Set();
    for (const aid of snap.st) {
      let v = ptsOf(aid), scorer = aid;
      if (v == null) {
        const p0 = byAid[aid];
        const sub = (snap.bn || []).find((x) => !usedSubs.has(x) && byAid[x] && p0 && byAid[x].pos === p0.pos && ptsOf(x) != null);
        if (sub) { usedSubs.add(sub); scorer = sub; v = ptsOf(sub); }
      }
      if (v == null) continue;
      if (snap.cap != null && aid === snap.cap) v *= 2;
      total += v;
    }
    return total;
  }
  const realTotal = useMemo(() => ROUNDS.reduce((sum, r) => sum + (realRoundPoints(r.id) || 0), 0), [snaps, realRounds, byAid, userStart, tick]);

  // نقاط لاعب بعينه في جولة محددة مع تفصيل كامل
  const matchName = (evName, p) => {
    if (!evName || !p) return false;
    const evL = evName.split(" ").pop().toLowerCase().replace(/[^a-z]/g,"");
    return p.en.toLowerCase().split(" ").some(w => w.replace(/[^a-z]/g,"").length >= 4 && w.replace(/[^a-z]/g,"") === evL);
  };

  function playerRoundDetail(pid, rid) {
    const p = P[pid]; if (!p) return null;
    const info = realRounds[rid];
    if (!info?.ms?.length) return null;
    let played = false, goals = 0, assists = 0, ownGoals = 0;
    let yellowCards = 0, redCards = 0, penMissed = 0;
    let conceded = 0, cleanSheet = false, hasAfData = false;

    for (const m of info.ms) {
      if (!["FINISHED","IN_PLAY","PAUSED"].includes(m.status)) continue;
      const a = tidOf(m.homeTeam), b = tidOf(m.awayTeam);
      if (a !== p.team && b !== p.team) continue;
      played = true;
      const ft = m.score?.fullTime || m.score?.regularTime || {};
      const hg = ft.home ?? 0, ag = ft.away ?? 0;
      const conc = p.team === a ? ag : hg;
      conceded += conc;
      if (conc === 0) cleanSheet = true;

      // بيانات API-Football (أدق) — مطابقة بالاسم
      const fid = afByKey[mkKey(a, b)];
      const evts = fid ? (afEvents[fid] || []) : [];
      if (evts.length > 0) {
        hasAfData = true;
        for (const ev of evts) {
          if (!ev.teamId || ev.teamId !== p.team) continue;
          if (ev.type === "Goal") {
            if (ev.detail === "Own Goal") { if (matchName(ev.playerName, p)) ownGoals++; }
            else if (ev.detail === "Missed Penalty") { if (matchName(ev.playerName, p)) penMissed++; }
            else { if (matchName(ev.playerName, p)) goals++; else if (matchName(ev.assistName, p)) assists++; }
          } else if (ev.type === "Card") {
            if (matchName(ev.playerName, p)) {
              (ev.detail?.includes("Red") || ev.detail?.includes("Second")) ? redCards++ : yellowCards++;
            }
          }
        }
      } else {
        // احتياطي: football-data.org (بدون أسماء في الخطة المجانية)
        for (const g of m.goals || []) {
          const sid = g.scorer?.id; const aid2 = g.assist?.id;
          if (g.type === "OWN") { if (p.aid && sid === p.aid) ownGoals++; }
          else { if (p.aid && sid === p.aid) goals++; if (p.aid && aid2 === p.aid) assists++; }
        }
      }
    }
    if (!played) return { played: false };

    const base = 2;
    const gPts = goals * goalPts(p.pos);
    const aPts = assists * 3;
    const ogPts = ownGoals * -2;
    const csPts = cleanSheet ? (p.pos === "GK" || p.pos === "DEF" ? 4 : p.pos === "MID" ? 1 : 0) : 0;
    const concPts = (p.pos === "GK" || p.pos === "DEF") ? -Math.floor(conceded / 2) : 0;
    const ycPts = yellowCards * -1;
    const rcPts = redCards * -3;
    const pmPts = penMissed * -2;
    const total = base + gPts + aPts + ogPts + csPts + concPts + ycPts + rcPts + pmPts;

    return {
      played: true, hasDetailedData: hasAfData,
      base, goals, gPts, assists, aPts,
      ownGoals, ogPts, cleanSheet, csPts,
      conceded, concPts, yellowCards, ycPts,
      redCards, rcPts, penMissed, pmPts, total
    };
  }
  const displayTotal = mode === "real" ? realTotal : userTotal;


  const aliveNow = mode === "real" ? aliveReal : alive;
  const eliminatedNow = starters.filter((id) => !aliveNow.has(P[id]?.team));
  const fmtKO = (d) => new Date(d).toLocaleString(ar ? "ar-SA" : "en-GB", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });
  const hoursLeft = (ts) => Math.max(0, Math.round((ts - Date.now()) / 3600000 * 10) / 10); // tick يجعلها تتحدث تلقائياً

  /* ---------- الحسابات والقروبات ---------- */
  useEffect(() => {
    if (!sb) return;
    sb.auth.getSession().then(({ data }) => { setUser(data.session?.user || null); setAuthReady(true); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, sess) => setUser(sess?.user || null));
    return () => sub.subscription.unsubscribe();
  }, []);

              </button>
            )}
            {mode === "sim" && phase === "build" && <div style={{ color: MUTED, fontSize: 12, textAlign: "center" }}>{t("اعتمد فريقك من تبويب «فريقي» ثم ابدأ البطولة — 72 مباراة مجموعات و31 مباراة إقصائية بانتظارك", "Confirm your squad in “My Team” — 72 group matches and 31 knockout games await")}</div>}

            {mode === "sim" && [...history].reverse().map((h, i) => {
              const r = ROUNDS.find((x) => x.id === h.roundId);
              return (
                <div key={i} style={{ display: "grid", gap: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 4 }}>
                    <div style={{ fontWeight: 800, color: NODE_COLORS[ROUNDS.indexOf(r)], fontSize: 13 }}>◆ {ar ? r.ar : r.en} <span style={{ color: MUTED, fontWeight: 600 }}>({h.matches.length} {t("مباراة", "matches")})</span></div>
                    <Pill color={GREEN} bg="rgba(0,184,104,.1)">{t("نقاطك", "You")}: +{h.userPts}{h.tc ? " ⭐" : ""}</Pill>
                  </div>
                  {h.matches.map((m, j) => <MatchCard key={j} m={m} />)}
                </div>
              );
            })}
          </div>
        )}

        {/* ===== STANDINGS / LEADERBOARD ===== */}
        {tab === "rank" && (
          <div className="rise" style={{ display: "grid", gap: 14 }}>
            {mode === "real" && (
              <div style={S.card}>
                <div style={{ fontWeight: 800, color: GOLD_SOFT, marginBottom: 10, fontSize: 13 }}>◆ {t("ترتيب المجموعات الرسمي", "Official group standings")}</div>
                {!rs?.length && <div style={{ color: MUTED, fontSize: 12 }}>{t("لا يتوفر ترتيب بعد — يُحدّث تلقائياً مع النتائج", "No standings yet — updates automatically")}</div>}
                {(rs || []).filter((g) => (g.type ? g.type === "TOTAL" : true)).map((g, gi) => (
                  <div key={gi} style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, marginBottom: 4 }}>{String(g.group || "").replace("GROUP_", t("المجموعة ", "Group "))}</div>
                    {(g.table || []).map((row, i) => {
                      const tid = tidOf(row.team);
                      return (
                        <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, padding: "4px 6px" }}>
                          <span>{i + 1}. {tid ? <Crest tid={tid} s={14} /> : null} {tid ? tname(tid) : (row.team?.name || "")}</span>
                          <span style={{ color: MUTED }}>{row.playedGames ?? 0} {t("م", "P")} • {row.points ?? 0} {t("ن", "pts")}</span>
                        </div>
                      );
                    })}
                  </div>
                ))}
                <div style={{ fontSize: 11, color: MUTED, marginTop: 4 }}>👥 {t("ترتيب أصدقائك تجده في تبويب الدوريات", "Your friends ranking lives in the Leagues tab")}</div>
              </div>
            )}

            {mode === "sim" && (
            <div style={S.card}>
              <div style={{ fontWeight: 800, color: GOLD_SOFT, marginBottom: 10, fontSize: 13 }}>◆ {t("ترتيب الدوري المصغّر", "Mini-league")}</div>
              {[{ nm: t("أنت", "You"), pts: userTotal, me: true }, ...BOTS.map((b, i) => ({ nm: ar ? b.ar : b.en, pts: botPts[i] }))]
                .sort((a, b) => b.pts - a.pts)
                .map((r, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 6px", borderBottom: `1px solid ${LINE}`, background: r.me ? "rgba(255,179,0,.10)" : "transparent", borderRadius: 8 }}>
                    <div style={{ fontSize: 13, fontWeight: r.me ? 900 : 600, color: r.me ? GOLD_SOFT : TEXT }}>{i + 1}. {r.nm}</div>
                    <div style={{ fontWeight: 800, fontSize: 13 }}>{r.pts}</div>
                  </div>
                ))}
            </div>)}

            {mode === "sim" && groupResults.length > 0 && (
              <div style={S.card}>
                <div style={{ fontWeight: 800, color: GOLD_SOFT, marginBottom: 10, fontSize: 13 }}>◆ {t("ترتيب المجموعات الـ12", "All 12 group standings")}</div>
                {GROUPS.map((g) => (
                  <div key={g} style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: MUTED, fontWeight: 700, marginBottom: 4 }}>{t("المجموعة", "Group")} {g}</div>
                    {groupTeams(g).sort(rankCmp(standings)).map((tid, i) => (
                      <div key={tid} style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, padding: "4px 6px", color: !alive.has(tid) && roundIdx > 2 ? MUTED : TEXT }}>
                        <span>{i + 1}. <Crest tid={tid} s={16} /> {tname(tid)}</span>
                        <span style={{ color: MUTED }}>{standings[tid].pts} {t("ن", "pts")} • {standings[tid].gd > 0 ? "+" : ""}{standings[tid].gd}</span>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ===== GROUPS / ACCOUNT ===== */}
        {tab === "league" && (
          <div className="rise" style={{ display: "grid", gap: 12 }}>
            {!sb && <div style={S.card}>{t("خدمة الحسابات غير متاحة — أعد تحميل الصفحة", "Accounts unavailable — reload the page")}</div>}

            {sb && !user && (
              <div style={S.card}>
                <div style={{ fontWeight: 900, fontSize: 15, marginBottom: 10 }}>🔐 {t("سجّل الدخول للعب مع أصدقائك", "Sign in to play with friends")}</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                  <button onClick={() => setAuthMode("in")} style={{ ...S.btn(authMode === "in"), flex: 1, padding: "8px" }}>{t("دخول", "Sign in")}</button>
                  <button onClick={() => setAuthMode("up")} style={{ ...S.btn(authMode === "up"), flex: 1, padding: "8px" }}>{t("حساب جديد", "Sign up")}</button>
                </div>
                {authMode === "up" && <input value={uname} onChange={(e) => setUname(e.target.value)} placeholder={t("اسم المستخدم (يظهر لأعضاء الدوري)", "Username (shown in leagues)")} style={S.inp} />}
                <input value={aEmail} onChange={(e) => setAEmail(e.target.value)} placeholder={t("الإيميل", "Email")} type="email" autoCapitalize="none" style={S.inp} />
                <input value={aPass} onChange={(e) => setAPass(e.target.value)} placeholder={t("كلمة المرور (6+ أحرف)", "Password (6+ chars)")} type="password" style={S.inp} />
                {authMode === "in" && (
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: MUTED, cursor: "pointer", marginBottom: 8, userSelect: "none" }}>
                    <input type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} style={{ width: 15, height: 15, accentColor: GOLD, cursor: "pointer" }} />
                    {t("تذكرني", "Remember me")}
                  </label>
                )}
                <button disabled={busy} onClick={doAuth} style={{ ...S.btn(true), width: "100%", marginTop: 2, opacity: busy ? 0.6 : 1 }}>{busy ? "…" : authMode === "up" ? t("إنشاء الحساب", "Create account") : t("دخول", "Sign in")}</button>
                <div style={{ fontSize: 10.5, color: MUTED, marginTop: 8, textAlign: "center" }}>{t("الدخول عبر قوقل/تويتر/أبل يُضاف لاحقاً", "Google/X/Apple sign-in coming later")}</div>
              </div>
            )}

            {sb && user && (<>
              <div style={{ ...S.card, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontWeight: 900 }}>👤 {uname || user.email}</div>
                  <div style={{ fontSize: 11, color: MUTED, overflow: "hidden", textOverflow: "ellipsis" }}>{user.email}</div>
                </div>
                <div style={{ display: "flex", gap: 6, flexShrink: 0, alignItems: "center" }}>
                  <Pill color={GREEN} bg="rgba(0,184,104,.1)">☁️ {t("مزامنة تلقائية", "Auto-sync")}</Pill>
                  <button onClick={() => sb.auth.signOut()} style={{ ...S.btn(false), padding: "8px 12px" }}>{t("خروج", "Out")}</button>
                </div>
              </div>

              <div style={S.card}>
                <div style={{ fontWeight: 800, color: GOLD_SOFT, marginBottom: 8, fontSize: 13 }}>◆ {t("الدوريات", "Leagues")}</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={gName} onChange={(e) => setGName(e.target.value)} placeholder={t("اسم دوري جديد…", "New league name…")} style={{ ...S.inp, flex: 1, marginBottom: 0 }} />
                  <button onClick={createGroup} style={S.btn(true)}>＋ {t("أنشئ", "Create")}</button>
                </div>
                <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                  <input value={jCode} onChange={(e) => setJCode(e.target.value)} placeholder={t("…أو الصق كود الانضمام", "…or paste invite code")} autoCapitalize="characters" style={{ ...S.inp, flex: 1, marginBottom: 0 }} />
                  <button onClick={joinGroup} style={S.btn(false)}>{t("انضم", "Join")}</button>
                </div>
              </div>

              {myGroups.map((g) => (
                <div key={g.id} className="mrow" style={{ ...S.card, "--tc": C26P, cursor: "pointer" }} onClick={() => openGroup(g)}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ fontWeight: 800 }}>👥 {g.name}</div>
                    <Pill color={C26P} bg="rgba(139,61,255,.1)">{t("الكود", "Code")}: {g.code}</Pill>
                  </div>
                </div>
              ))}

              {gView && (
                <div style={S.card}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontWeight: 900 }}>🏆 {gView.group.name}</div>
                    <button onClick={() => { setGView(null); setMemberView(null); }} style={{ ...S.btn(false), padding: "4px 10px" }}>✕</button>
                  </div>
                  {gView.rows.map((r, i) => (
                    <div key={r.user_id} onClick={() => r.payload && setMemberView(r)} style={{ display: "flex", justifyContent: "space-between", padding: "8px 6px", borderBottom: `1px solid ${LINE}`, cursor: r.payload ? "pointer" : "default", background: r.user_id === user.id ? "rgba(255,179,0,.10)" : "transparent", borderRadius: 8 }}>
                      <div style={{ fontWeight: r.user_id === user.id ? 900 : 600, fontSize: 13 }}>{i + 1}. {r.username} {r.payload ? "👁️" : ""}</div>
                      <div style={{ fontWeight: 800, fontSize: 13 }}>{r.points ?? "—"}</div>
                    </div>
                  ))}
                  <div style={{ fontSize: 10.5, color: MUTED, marginTop: 6 }}>{t("اضغط على أي عضو لعرض تشكيلته ونقاطه", "Tap a member to view their squad")}</div>
                </div>
              )}

              {memberView && (
                <div style={S.card}>
                  <div style={{ fontWeight: 900, marginBottom: 8 }}>📋 {memberView.username} — {memberView.payload.formation} — {memberView.payload.total ?? memberView.points} {t("نقطة", "pts")}</div>
                  {["GK", "DEF", "MID", "FWD"].map((pos) => (
                    <div key={pos} style={{ fontSize: 12.5, padding: "5px 0", borderBottom: `1px solid ${LINE}` }}>
                      <b style={{ color: MUTED }}>{t({ GK: "حراسة", DEF: "دفاع", MID: "وسط", FWD: "هجوم" }[pos], pos)}:</b> {(memberView.payload.starters || []).filter((x) => x.pos === pos).map((x) => x.n + (memberView.payload.captain && memberView.payload.captain.n === x.n ? " ©" : "")).join("، ")}
                    </div>
                  ))}
                  {(memberView.payload.bench || []).length > 0 && (
                    <div style={{ fontSize: 12, padding: "5px 0", color: MUTED }}>🪑 {(memberView.payload.bench || []).map((x) => x.n).join("، ")}</div>
                  )}
                </div>
              )}
            </>)}
          </div>
        )}
      </div>
      </div>

      {/* toast */}
      {/* ===== MODAL نقاط اللاعب ===== */}
      {selectedPlayer != null && (() => {
        const p = P[selectedPlayer]; if (!p) return null;
        const tc = TEAM[p.team].c;
        const isCap = captain === selectedPlayer;
        const rows = ROUNDS.map(r => {
          const snap = snaps[r.id];
          const d = playerRoundDetail(selectedPlayer, r.id);
          const inSnap = snap && (snap.st || []).concat(snap.bn || []).includes(p.aid);
          return { r, d, snap, inSnap };
        }).filter(x => x.d);
        const grandTotal = rows.reduce((s, {r, d, snap}) => {
          if (!d?.played) return s;
          let v = d.total;
          if (snap?.cap === p.aid) v *= 2;
          return s + v;
        }, 0);
        return (
          <div key={`modal-${selectedPlayer}-${tick}`} style={{ position:"fixed", inset:0, zIndex:100, background:"rgba(0,0,0,.75)", display:"grid", placeItems:"center", padding:16 }} onClick={() => setSelectedPlayer(null)}>
            <div style={{ ...S.card, width:"100%", maxWidth:400, maxHeight:"85vh", overflowY:"auto", borderColor: tc }} onClick={e => e.stopPropagation()}>
              {/* header */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
                <div>
                  <div style={{ fontWeight:900, fontSize:16 }}>{name(p)} {isCap ? <span style={{ color:GOLD }}>©</span> : ""}</div>
                  <div style={{ fontSize:12, color:MUTED }}>{tname(p.team)} • {t({GK:"حارس",DEF:"مدافع",MID:"وسط",FWD:"مهاجم"}[p.pos], p.pos)} • {p.price.toFixed(1)}M</div>
                </div>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:26, fontWeight:900, color:GOLD }}>{grandTotal}</div>
                  <div style={{ fontSize:10, color:MUTED }}>{t("إجمالي","Total")}</div>
                </div>
              </div>
              {/* زر الكابتن */}
              <div style={{ display:"flex", gap:8, marginBottom:12 }}>
                {starters.includes(selectedPlayer) && phase !== "done" && (
                  <button onClick={() => { setCaptain(selectedPlayer); setSelectedPlayer(null); }} style={{ ...S.btn(isCap), flex:1, fontSize:12 }}>
                    {isCap ? `✓ ${t("كابتن","Capt.")}` : `⭐ ${t("كابتن ×2","×2")}`}
                  </button>
                )}
                {bench.includes(selectedPlayer) && phase !== "done" && (
                  <button onClick={() => { benchTap(selectedPlayer); setSelectedPlayer(null); }} style={{ ...S.btn(false), flex:1, fontSize:12 }}>
                    🔄 {t("أدخله الملعب","To XI")}
                  </button>
                )}
              </div>
              {/* تفصيل كل جولة */}
              {rows.length === 0 ? (
                <div style={{ color:MUTED, fontSize:13, textAlign:"center", padding:"20px 0" }}>{t("لا توجد بيانات جولات بعد","No round data yet")}</div>
              ) : rows.map(({r, d, snap}) => {
                const capBonus = snap?.cap === p.aid;
                const finalPts = d?.played ? (d.total * (capBonus ? 2 : 1)) : null;
                return (
                  <div key={r.id} style={{ background:"rgba(255,255,255,.03)", border:`1px solid ${LINE}`, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <div style={{ fontWeight:800, fontSize:13 }}>{ar ? r.ar : r.en}</div>
                      <div style={{ fontWeight:900, fontSize:15, color: finalPts > 0 ? GOLD : finalPts === 0 ? MUTED : RED }}>
                        {finalPts != null ? `${finalPts}${t("ن","p")}` : t("لم يلعب","DNS")}
                      </div>
                    </div>
                    {d.played && (
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"5px 12px", fontSize:11.5, color:MUTED }}>
                        <span>⚡ {t("مشاركة","Played")} <span style={{ color:TEXT, fontWeight:700 }}>+{d.base}{t("ن","p")}</span></span>
                        {d.goals > 0 && <span>⚽ {d.goals} {t("هدف","goal")} <span style={{ color:GREEN, fontWeight:700 }}>+{d.gPts}{t("ن","p")}</span></span>}
                        {d.assists > 0 && <span>🎯 {d.assists} {t("تمريرة","assist")} <span style={{ color:"#7BC67E", fontWeight:700 }}>+{d.aPts}{t("ن","p")}</span></span>}
                        {d.cleanSheet && d.csPts > 0 && <span>🔒 {t("شباك نظيفة","Clean Sheet")} <span style={{ color:"#5BC4FF", fontWeight:700 }}>+{d.csPts}{t("ن","p")}</span></span>}
                        {d.conceded > 0 && d.concPts < 0 && <span>🥅 {t("أهداف مستقبَلة","Goals conceded")} ({d.conceded}) <span style={{ color:RED, fontWeight:700 }}>{d.concPts}{t("ن","p")}</span></span>}
                        {d.ownGoals > 0 && <span>🔴 {t("هدف عكسي","Own Goal")} <span style={{ color:RED, fontWeight:700 }}>{d.ogPts}{t("ن","p")}</span></span>}
                        {d.yellowCards > 0 && <span>🟨 {t("بطاقة صفراء","Yellow Card")} <span style={{ color:"#FFD700", fontWeight:700 }}>{d.ycPts}{t("ن","p")}</span></span>}
                        {d.redCards > 0 && <span>🟥 {t("بطاقة حمراء","Red Card")} <span style={{ color:RED, fontWeight:700 }}>{d.rcPts}{t("ن","p")}</span></span>}
                        {d.penMissed > 0 && <span>❌ {t("جزاء ضائع","Pen Missed")} <span style={{ color:RED, fontWeight:700 }}>{d.pmPts}{t("ن","p")}</span></span>}
                        {capBonus && <span>© {t("مضاعف الكابتن","Captain ×2")} <span style={{ color:GOLD, fontWeight:700 }}>×2</span></span>}
                      </div>
                    )}
                  </div>
                );
              })}
              <button onClick={() => setSelectedPlayer(null)} style={{ ...S.btn(false), width:"100%", marginTop:4 }}>{t("إغلاق","Close")}</button>
            </div>
          </div>
        );
      })()}

      {toast && (
        <div className="pop" style={{ position: "fixed", bottom: 20, left: 0, right: 0, margin: "0 auto", width: "fit-content", background: "rgba(10,18,48,.95)", border: `1px solid ${GOLD}`, color: TEXT, padding: "10px 18px", borderRadius: 12, fontSize: 13, fontWeight: 700, zIndex: 50, boxShadow: `0 0 25px rgba(201,169,97,.3), 0 8px 24px rgba(0,0,0,.5)`, backdropFilter: "blur(10px)" }}>{toast}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
